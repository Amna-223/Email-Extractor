<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Feedback - Email Extractor</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <span class="nav-logo">Email Extractor</span>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/contact">Feedback</a>
                <a href="/terms">Terms</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 60px;">
        <h2 class="page-title">Send Feedback</h2>
        <p class="page-subtitle">Have a suggestion or found a bug? I'd love to hear from you.</p>

        {% if sent %}
            <div class="success">Your message has been sent. Thank you!</div>
        {% endif %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/contact" method="POST" class="contact-form">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label>Your Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="5" placeholder="Write your feedback here..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

    <footer class="footer">
        <p>Built by Aamna &nbsp;|&nbsp; <a href="/contact">Send Feedback</a> &nbsp;|&nbsp; <a href="/terms">Terms of Use</a></p>
    </footer>
</body>
</html>
